<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Ironmark shield logo">
  <defs>
    <linearGradient id="steel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f2f4f6"/><stop offset="1" stop-color="#8a929b"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#000" stop-opacity=".55"/><stop offset="1" stop-color="#000" stop-opacity=".0"/>
    </linearGradient>
  </defs>
  <!-- outer shield -->
  <path d="M60 8 104 24v33c0 29-19.5 46-44 53C35.5 103 16 86 16 57V24L60 8z"
        fill="rgba(0,0,0,.30)" stroke="url(#steel)" stroke-width="3.2" />
  <!-- inner shield -->
  <path d="M60 18 92 30v26c0 21-14 33.5-32 39-18-5.5-32-18-32-39V30L60 18z"
        fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.18)" stroke-width="1.5"/>
  <!-- stylised M -->
  <path d="M33 82V38h15l12 20 12-20h15v44H85V57L72 78 60 59 47 78V82H33z"
        fill="url(#steel)" opacity="0.95"/>
  <!-- orange base chevron -->
  <path d="M24 92h72" stroke="#f28a1a" stroke-width="6" stroke-linecap="round" opacity="0.95"/>
  <path d="M24 92h72" stroke="url(#shadow)" stroke-width="10" stroke-linecap="round" opacity="0.35"/>
</svg>
